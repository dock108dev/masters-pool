server {
    listen       3002;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP: allows Clerk CDN, self-hosted assets, and same-origin API.
    # Adjust clerk.*.lcl.dev / clerk.your-domain.com to match your Clerk Frontend API domain.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.clerk.io https://*.clerk.accounts.dev; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.clerk.com https://*.clerk.accounts.dev https://clerk.io; img-src 'self' data: https:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass         https://sda.dock108.dev;
        proxy_set_header   Host sda.dock108.dev;
        proxy_set_header   X-API-Key $SPORTS_API_KEY;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
