# SPA for every host that resolves to this container.
# Caddy on the host terminates TLS and forwards to localhost:3002.
# The `_` default_server catches any hostname not explicitly listed.
server {
    listen       3002 default_server;
    server_name  countryclubpicks.com www.countryclubpicks.com
                 onboard.countryclubpicks.com admin.countryclubpicks.com
                 rvcc.countryclubpicks.com crestmont.countryclubpicks.com
                 rvcc.dock108.dev crestmont.dock108.dev
                 onboard.dock108.dev admin.dock108.dev
                 _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP: allow Plausible analytics + same-origin API.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://plausible.io; style-src 'self' 'unsafe-inline'; connect-src 'self' https://plausible.io; img-src 'self' data: https:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass         https://sda.dock108.dev;
        proxy_set_header   Host sda.dock108.dev;
        proxy_set_header   X-API-Key $SPORTS_API_KEY;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
