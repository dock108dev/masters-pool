services:
  masters-pool-web:
    image: ghcr.io/dock108dev/masters-pool/web:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: masters-pool-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3002"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
